server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: lanxin-campus-ai
  datasource:
    url: jdbc:h2:file:./data/campus-ai;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
      file-size-threshold: 1KB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    database-platform: org.hibernate.dialect.H2Dialect

app:
  demo-user: vivo-campus-demo

lanxin:
  api-key: ${LANXIN_API_KEY:}
  api-url: ${LANXIN_API_URL:https://api-ai.vivo.com.cn/v1}
  model: ${LANXIN_MODEL:Doubao-Seed-2.0-mini}
